<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pousada Regina — Aurora do Tocantins</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --verde-musgo: #4a6741;
      --verde-claro: #7fa870;
      --areia: #f5ede0;
      --terra: #c47c3e;
      --marrom-escuro: #2e1f10;
      --branco: #fdfaf6;
      --texto: #3a2e1f;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Lato', sans-serif;
      background: var(--branco);
      color: var(--texto);
      overflow-x: hidden;
    }

    /* ── NAV ── */
    nav {
      position: fixed; top: 0; width: 100%; z-index: 100;
      display: flex; justify-content: space-between; align-items: center;
      padding: 18px 48px;
      background: rgba(253,250,246,0.9);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(74,103,65,0.15);
    }
    .nav-logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem;
      color: var(--verde-musgo);
      letter-spacing: 0.03em;
    }
    .nav-links { display: flex; gap: 32px; list-style: none; }
    .nav-links a {
      font-size: 0.85rem; letter-spacing: 0.12em; text-transform: uppercase;
      text-decoration: none; color: var(--texto);
      transition: color 0.25s;
    }
    .nav-links a:hover { color: var(--terra); }

    /* ── HERO ── */
    .hero {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      background: linear-gradient(160deg, rgba(46,31,16,0.6) 0%, rgba(74,103,65,0.4) 100%),
                  url('https://images.unsplash.com/photo-1501785888041-af3ef285b470?auto=format&fit=crop&q=80&w=2070') center/cover no-repeat;
      text-align: center;
      padding: 120px 24px 80px;
      position: relative;
    }
    .hero-content { position: relative; z-index: 1; max-width: 700px; color: #fff; }
    .hero h1 { font-family: 'Playfair Display', serif; font-size: clamp(2.5rem, 6vw, 4.5rem); line-height: 1.1; margin-bottom: 20px; }
    .hero h1 em { font-style: italic; color: #d4e8c2; }
    .hero p { font-size: 1.1rem; margin-bottom: 30px; opacity: 0.9; }

    .btn-primary {
      display: inline-block;
      background: var(--terra);
      color: #fff;
      padding: 16px 40px;
      border-radius: 100px;
      text-decoration: none;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      transition: 0.3s;
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    }
    .btn-primary:hover { transform: translateY(-3px); background: #a8662c; }

    /* ── FOOTER ── */
    footer { padding: 60px 48px; background: var(--marrom-escuro); color: var(--branco); text-align: center; }
    .footer-credits { margin-top: 20px; font-size: 0.8rem; opacity: 0.6; }
  </style>
</head>
<body>

  <nav>
    <div class="nav-logo">Pousada Regina</div>
    <ul class="nav-links">
      <li><a href="#">Início</a></li>
      <li><a href="#sobre">A Pousada</a></li>
      <li><a href="https://wa.me/5563992679230?text=Olá%20Débora!%20Gostaria%20de%20reservar." target="_blank">Contato</a></li>
    </ul>
  </nav>

  <section class="hero">
    <div class="hero-content">
      <h1>Onde o <em>conforto</em> encontra o Cerrado</h1>
      <p>Sua base para explorar os tesouros de Aurora do Tocantins.</p>
      <a href="https://wa.me/5563992679230?text=Olá%20Débora!%20Gostaria%20de%20saber%20a%20disponibilidade%20da%20Pousada%20Regina." 
         class="btn-primary" target="_blank">Ver Disponibilidade</a>
    </div>
  </section>

  <footer>
    <p>Aurora do Tocantins — TO</p>
    <div class="footer-credits">Design por <strong>Reolsi Designer</strong></div>
  </footer>

</body>
</html>
